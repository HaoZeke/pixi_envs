[workspace]
authors = ["Rohit Goswami <rgoswami@ieee.org>"]
channels = ["conda-forge"]
name = "metatomic"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
nushell = ">=0.110.0,<0.111"

[feature.docs.dependencies]
doxygen = ">=1.13.2,<2"
doxyrest = ">=2.1.2,<3"
lua = ">=5.4.8,<6"
tox = ">=4.34.1,<5"

[feature.torch.dependencies]
cmake = ">=3.30,<4"
ninja = ">=1.12,<2"
cxx-compiler = ">=1.9,<2"
pytorch = ">=2.9.1,<3"
# conda metatensor-torch provides cmake config files for C++ builds
metatensor-torch = ">=0.8,<1"

[feature.torch.pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cpu"]

[feature.torch.tasks]
configure-tests = { cwd = "metatomic/metatomic-torch", cmd = "cmake -B build -G Ninja -DMETATOMIC_TORCH_TESTS=ON -DCMAKE_BUILD_TYPE=Release" }
build-tests = { cwd = "metatomic/metatomic-torch", cmd = "cmake --build build", depends-on = ["configure-tests"] }
test-torch = { cwd = "metatomic/metatomic-torch", cmd = "ctest --test-dir build -V", depends-on = ["build-tests"] }

[environments]
docs = { features = ["docs"]}
torch = { features = ["torch"]}
